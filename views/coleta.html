<!-- COLETA -->
<div class="view" id="view-coleta">
    <div class="view-header">
        <h2>Solicitar coleta</h2>
        <p>Preencha o formulário para agendar uma coleta de resíduos eletrônicos</p>
    </div>
    <div class="form-grid">
        <div class="form-group">
            <label>Nome completo / empresa</label>
            <input type="text" placeholder="João Silva ou Tech Ltda">
        </div>
        <div class="form-group">
            <label>CPF / CNPJ</label>
            <input type="text" placeholder="000.000.000-00">
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" placeholder="contato@empresa.com">
        </div>
        <div class="form-group">
            <label>Telefone / WhatsApp</label>
            <input type="tel" placeholder="(85) 9 0000-0000">
        </div>
        <div class="form-group full">
            <label>Endereço completo para coleta</label>
            <input type="text" placeholder="Rua, número, bairro, cidade — CEP">
        </div>
        <div class="form-group full">
            <label>Observações sobre os resíduos</label>
            <textarea
                placeholder="Descreva os itens a serem coletados (computadores, celulares, baterias, etc.)"></textarea>
        </div>
        <div class="form-group full">
            <label>Foto do resíduo <span style="color:#aaa;font-weight:400">(opcional)</span></label>
            <div class="upload-area">
                <i class="ti ti-photo-up" aria-hidden="true"></i>
                <span>Arraste ou clique para enviar uma foto</span>
                <div class="opt">JPG, PNG ou HEIF — máx. 10 MB</div>
            </div>
        </div>
    </div>
    <div class="form-actions">
        <button class="btn btn-ghost">Limpar</button>
        <button class="btn btn-primary"><i class="ti ti-calendar-check" aria-hidden="true"></i> Agendar coleta</button>
    </div>
</div>
